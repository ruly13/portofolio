<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="15" result="blur"/>
<feComposite in="SourceGraphic" in2="blur" operator="over"/>
</filter>
<linearGradient id="screenGrad" x1="100" y1="100" x2="400" y2="400" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#2D1B69"/>
<stop offset="1" stop-color="#1E1E2E"/>
</linearGradient>
<linearGradient id="bodyGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#6366F1"/>
<stop offset="1" stop-color="#8B5CF6"/>
</linearGradient>
<linearGradient id="checkGrad" x1="200" y1="200" x2="350" y2="350" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#34D399"/>
<stop offset="1" stop-color="#10B981"/>
</linearGradient>
<filter id="shadow" x="50" y="50" width="450" height="450" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
<feFlood flood-opacity="0.3" result="BackgroundImageFix"/>
<feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
<feGaussianBlur stdDeviation="20" result="effect1_foregroundBlur"/>
</filter>
</defs>

<!-- Main Device Body -->
<rect x="76" y="60" width="360" height="420" rx="40" fill="url(#bodyGrad)" transform="rotate(-5 256 256)"/>
<rect x="80" y="64" width="352" height="412" rx="36" fill="#18181B" transform="rotate(-5 256 256)" opacity="0.4"/>

<!-- Screen Area -->
<rect x="100" y="90" width="312" height="360" rx="20" fill="url(#screenGrad)" transform="rotate(-5 256 256)"/>

<!-- UI Elements: Header -->
<rect x="130" y="115" width="250" height="40" rx="10" fill="#FFFFFF" fill-opacity="0.1" transform="rotate(-5 256 256)"/>
<circle cx="150" cy="135" r="8" fill="#F472B6" transform="rotate(-5 256 256)"/>

<!-- UI Elements: List Items -->
<g transform="rotate(-5 256 256) translate(130, 180)">
  <rect width="180" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.2"/>
  <rect x="200" y="0" width="40" height="12" rx="6" fill="#34D399"/>
</g>
<g transform="rotate(-5 256 256) translate(130, 210)">
  <rect width="160" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.15"/>
  <rect x="200" y="0" width="40" height="12" rx="6" fill="#34D399"/>
</g>
<g transform="rotate(-5 256 256) translate(130, 240)">
  <rect width="190" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.1"/>
  <rect x="200" y="0" width="40" height="12" rx="6" fill="#34D399"/>
</g>
<g transform="rotate(-5 256 256) translate(130, 270)">
  <rect width="170" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.05"/>
  <rect x="200" y="0" width="40" height="12" rx="6" fill="#34D399"/>
</g>

<!-- Floating 3D Checkmark -->
<g filter="url(#glow)">
<path d="M360 320L280 400L220 340" stroke="url(#checkGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<!-- Stylus Pen -->
<rect x="440" y="140" width="24" height="240" rx="12" fill="#E4E4E7" transform="rotate(15 440 140)"/>
<path d="M440 380L448 400L464 380" fill="#A1A1AA" transform="rotate(15 440 140)"/>

</svg>
